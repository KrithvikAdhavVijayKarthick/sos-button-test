name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip guardian_sos_v2.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - name: Fix pubspec versions
        run: |
          cd guardian_sos
          sed -i 's/geolocator: .*/geolocator: ^13.0.1/' pubspec.yaml
          sed -i 's/flutter_background_service: .*/flutter_background_service: ^5.0.5/' pubspec.yaml
          sed -i 's/flutter_background_service_android: .*/flutter_background_service_android: ^6.2.2/' pubspec.yaml
          sed -i 's/sensors_plus: .*/sensors_plus: ^6.1.0/' pubspec.yaml

      - name: Get dependencies
        run: |
          cd guardian_sos
          flutter pub get

      - name: Build APK
        run: |
          cd guardian_sos
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: guardian-apk
          path: guardian_sos/build/app/outputs/flutter-apk/app-release.apk
